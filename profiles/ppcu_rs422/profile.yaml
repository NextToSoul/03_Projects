# PPCU RS422 测试项目配置
name: "PPCU RS422 测试项目"
version: "1.0"
description: "PPCU推力器 RS422 通讯接口测试"
created: "2026-06-10"

# ===== 通讯层配置 =====
transport:
  type: tcp
  config:
    host: "192.168.117.26"
    port: 20004
    reconnect_max_retries: 3
    reconnect_interval_s: 2
    timeout_s: 3.0

# ===== 协议层配置 =====
protocol:
  type: ccsds
  config:
    command_identifier: 0xEB90
    telemetry_identifier: 0x1ACF
    apid: 0x520
    endian: big
    sequence_range: [0, 16383]
    checksum_config:
      type: sum_invert
      range: [2, 9]

# ===== 遥测配置（需与Excel Sheet名完全一致） =====
telemetry:
  excel_path: "telemetry/遥测配置表.xlsx"
  patches_path: "telemetry/user_overrides.yaml"
  packages:
    - name: "常规包1"
      command_id: "APID_00C0"
      frame_type: fast
      default_poll: enabled
      poll_interval_s: 1
    - name: "常规包2"
      command_id: "APID_00C1"
      frame_type: fast
      default_poll: enabled
      poll_interval_s: 1
    - name: "查询包1"
      command_id: "APID_00C8"
      frame_type: slow
      default_poll: disabled

# ===== 指令配置 =====
commands:
  excel_path: "commands/立即遥控指令配置表.xlsx"

# ===== 参数注入配置 =====
injections:
  - name: "参数注入0x03FF"
    excel_path: "injections/固定地址参数注入1.xlsx"
  - name: "参数注入0x03FE"
    excel_path: "injections/固定地址参数注入2.xlsx"

# ===== 安全策略（引用 safety.yaml） =====
safety:
  policy_path: "safety.yaml"
  auto_connect: false

# ===== 会话管理 =====
session:
  auto_restore: true
